{% extends "base.html" %}

{% block title %}Анализатор страниц{% endblock %}

{% block content %}
  <div class="container-lg mt-3">
    <div class="card shadow-sm">
      <div class="card-body p-5 bg-white">
        <h1 class="display-4">Анализатор страниц</h1>
        <p class="lead">Бесплатно проверяйте сайты на SEO-пригодность</p>
        <form class="row g-2" method="post" action="#">
          <div class="col-12 col-md-8">
            <input class="form-control form-control-lg" type="url" name="url" placeholder="https://www.example.com" required>
          </div>
          <div class="col-12 col-md-4">
            <button class="btn btn-primary btn-lg w-100 text-uppercase" type="submit">Проверить</button>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
